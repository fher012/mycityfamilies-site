<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyCityFamilies</title>
  <meta
    name="description"
    content="MyCityFamilies helps families discover local events, places, and activities."
  />
  <meta property="og:title" content="MyCityFamilies" />

    property="og:description"
    content="Discover local events, places, and activities for families."

  <link rel="stylesheet" href="/styles.css" />
  <script>
    const iosStore = "https://apps.apple.com/app/6759351671";
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
      window.location.href = iosStore;
    }

<body>
  <main class="page-shell">

      </p>
      <div class="button-row">
        <a class="button button-primary" href="https://apps.apple.com/app/6759351671">View on the App Store</a>
        <a class="button button-secondary" href="/support/">Support</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Footer">
      <a href="/support/">Support</a>
      <a href="/privacy/">Privacy Policy</a>
